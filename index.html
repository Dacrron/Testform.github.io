<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Registraion Form</title>
</head>
<body>
    <div class="Bg-container">
        <div class="title-container">Registration</div>
        <form action="#">
            <div class="Detail-box">
                <div class="input-box">
                    <span class="categ">Full Name</span>
                    <input type="text" placeholder="Enter Your Name" required>
                </div>
                    <div class="input-box">
                        <span class="categ">User Name</span>
                        <input type="text" placeholder="Enter Username" required>
                    </div>
                        <div class="input-box">
                            <span class="categ">Email</span>
                            <input type="text" placeholder="Enter Your EmailAddress" required>
                        </div>
                            <div class="input-box">
                                <span class="categ">Phone Number</span>
                                <input type="text" placeholder="Enter Your Contact Number" required>
                            </div>
                                <div class="input-box">
                                    <span class="categ">Password</span>
                                    <input type="text" placeholder="Enter Your Password" required>
                                </div>
                                        <div class="input-box">
                                            <span class="categ">Confirm Password</span>
                                            <input type="text" placeholder="Confirm The Password" required>
                                        </div>
                                    <div class="Gender-Detail">
                                        <input type="radio" name="gender" id="dot-1">
                                        <input type="radio" name="gender" id="dot-2">
                                        <input type="radio" name="gender" id="dot-3">
                                            <span class="gendertitle">Gender</span>
                                            <div class="gendertype">
                                            <label for="dot-1">
                                                <span class="dot one"></span>
                                                <span class="gendername">Male</span>
                                            </label>
                                            <label for="dot-2">
                                                <span class="dot two"></span>
                                                <span class="gendername">Female</span>
                                            </label>
                                            <label for="dot-3">
                                                <span class="dot three"></span>
                                                <span class="gendername">Others</span>
                                            </label>
                                        </div>

                                     </div>
                                         <div class="btn">
                                             <button class="btn1">Create Account</button>

                                        </div>
            </div>
        </form>

    </div>







    
</body>
</html>
